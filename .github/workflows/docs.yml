name: Docs CI
run-name: ${{ github.actor }} started CI

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - docs/**
  pull_request:
    branches: [master]
    paths:
      - docs/**

jobs:
  build:
    defaults:
      run:
        working-directory: docs

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm i

      - name: Lint
        run: pnpm run lint
