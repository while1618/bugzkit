name: UI CI
run-name: ${{ github.actor }} started CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - ui/**
      - api/src/main/java/**
  pull_request:
    branches: [master]
    paths:
      - ui/**
      - api/src/main/java/**

env:
  PUBLIC_APP_NAME: ${{vars.PUBLIC_APP_NAME}}
  PUBLIC_API_URL: ${{vars.PUBLIC_API_URL}}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ui:
              - 'ui/**'
            api:
              - 'api/src/main/java/**'

  build:
    needs: changes
    if: needs.changes.outputs.ui == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ui

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Generate paraglide
        run: pnpm exec paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide

      - name: Type check
        run: pnpm run check

      - name: Unit tests
        run: pnpm run test:unit

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('ui/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps firefox

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps firefox

      - name: Integration tests
        env:
          PUBLIC_API_URL: http://localhost:8080
          JWT_SECRET: secret
          DOMAIN_NAME: localhost
        run: pnpm run test:integration

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            ui/playwright-report/
            ui/test-results/
          retention-days: 7

  check-models:
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      REDIS_PASSWORD: ""

    services:
      postgres:
        image: postgres:17.9-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: bugzkit
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: valkey/valkey:9.0.3
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Build API
        run: ./mvnw -B clean install -DskipTests
        working-directory: api

      - name: Start API
        run: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev &
        working-directory: api

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8080/v3/api-docs > /dev/null && echo "API ready" && exit 0
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "API failed to start" && exit 1

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ui

      - name: Generate models
        run: pnpm run generate:models
        working-directory: ui

      - name: Check for model drift
        run: git diff --exit-code ui/src/lib/models/api.d.ts

  push-image:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get ui version
        id: ui-version
        run: echo "version=$(jq -r .version ui/package.json)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ui
          file: ui/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ vars.DOCKER_REPOSITORY_UI }}:${{ steps.ui-version.outputs.version }}
            ${{ vars.DOCKER_REPOSITORY_UI }}:latest
          build-args: |
            PUBLIC_APP_NAME=${{ env.PUBLIC_APP_NAME }}
            PUBLIC_API_URL=${{ env.PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
