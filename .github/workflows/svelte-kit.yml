name: Svelte Kit CI
run-name: ${{ github.actor }} started CI

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - frontend/svelte-kit/**
      - backend/spring-boot/src/main/java/**
  pull_request:
    branches: [master]
    paths:
      - frontend/svelte-kit/**
      - backend/spring-boot/src/main/java/**

env:
  PUBLIC_APP_NAME: ${{vars.PUBLIC_APP_NAME}}
  PUBLIC_API_URL: ${{vars.PUBLIC_API_URL}}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/svelte-kit/**'
            backend:
              - 'backend/spring-boot/src/main/java/**'

  build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: frontend/svelte-kit

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm i

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:unit

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      - name: Integration tests
        env:
          PUBLIC_API_URL: http://localhost:8080
          JWT_SECRET: secret
          DOMAIN_NAME: localhost
        run: |
          npx playwright install --with-deps
          pnpm run test:integration

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/svelte-kit/playwright-report/
            frontend/svelte-kit/test-results/

  check-models:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      REDIS_PASSWORD: ""

    services:
      postgres:
        image: postgres:17.9-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: bugzkit
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: valkey/valkey:9.0.3
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Build Spring Boot
        run: ./mvnw -B clean install -DskipTests
        working-directory: backend/spring-boot

      - name: Start Spring Boot
        run: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev &
        working-directory: backend/spring-boot

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8080/v3/api-docs > /dev/null && echo "Backend ready" && exit 0
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "Backend failed to start" && exit 1

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install frontend dependencies
        run: pnpm i
        working-directory: frontend/svelte-kit

      - name: Generate models
        run: pnpm run generate:models
        working-directory: frontend/svelte-kit

      - name: Check for model drift
        run: git diff --exit-code frontend/svelte-kit/src/lib/models/api.d.ts

  push-image:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get ui version
        id: ui-version
        run: echo "version=$(jq -r .version frontend/svelte-kit/package.json)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: frontend/svelte-kit
          file: frontend/svelte-kit/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ vars.DOCKER_REPOSITORY_UI }}:${{ steps.ui-version.outputs.version }}
            ${{ vars.DOCKER_REPOSITORY_UI }}:latest
          build-args: |
            PUBLIC_APP_NAME=${{ env.PUBLIC_APP_NAME }}
            PUBLIC_API_URL=${{ env.PUBLIC_API_URL }}
