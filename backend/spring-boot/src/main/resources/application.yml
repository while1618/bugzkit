app:
  name: ${APP_NAME:bugzkit}
server:
  port: ${API_PORT:8080}

spring:
  sql:
    init:
      platform: postgres
  datasource:
    username: ${POSTGRES_USER:postgres}
  jpa:
    properties:
      jakarta:
        persistence:
          validation:
            mode: none
      hibernate:
        query:
          fail_on_pagination_over_collection_fetch: true
    open-in-view: false
  data:
    web:
      pageable:
        one-indexed-parameters: true
        default-page-size: 10
    redis:
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 60
  mail:
    properties:
      sender: ${SMTP_SENDER:noreply@bugzkit.com}

jwt:
  access-token:
    duration: ${ACCESS_TOKEN_DURATION:900}
  refresh-token:
    duration: ${REFRESH_TOKEN_DURATION:604800}
  verify-email-token:
    duration: ${VERIFY_EMAIL_TOKEN_DURATION:900}
  reset-password-token:
    duration: ${RESET_PASSWORD_TOKEN_DURATION:900}

rate-limit:
  enabled: true
